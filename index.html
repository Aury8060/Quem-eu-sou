<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quem Eu Sou</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body { background-color: #87CEEB; color: #333; height: 100vh; overflow: hidden; }
    
    .screen { display: none; width: 100vw; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .active { display: flex; }
    
    /* Telas de Menu e Login */
    h1 { color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 20px; text-align: center; }
    input, select, button { padding: 15px; margin: 10px; border-radius: 10px; border: none; font-size: 18px; width: 80%; max-width: 400px; }
    button { background-color: #fff; color: #87CEEB; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    
    /* Grid de Categorias */
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 90%; max-width: 800px; }
    .card { background: white; border-radius: 15px; padding: 10px; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; aspect-ratio: 1; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .card img { width: 60%; height: 60%; object-fit: contain; margin-bottom: 10px; }
    .card span { font-weight: bold; font-size: 14px; }

    /* Tela do Jogo */
    #game-screen { background-color: #87CEEB; transition: background-color 0.3s; }
    #word-display { font-size: 8vw; color: white; font-weight: bold; text-align: center; text-transform: uppercase; padding: 0 20px; }
    #timer-display { position: absolute; top: 20px; right: 20px; font-size: 24px; color: white; font-weight: bold; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; }
    .instrucao { position: absolute; bottom: 20px; color: white; font-size: 14px; text-align: center; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; }

    /* Ranking e Admin */
    .table-container { background: white; width: 90%; max-width: 600px; border-radius: 15px; padding: 20px; max-height: 60vh; overflow-y: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    table { width: 100%; text-align: left; border-collapse: collapse; }
    th, td { padding: 12px 10px; border-bottom: 1px solid #eee; }
    th { color: #87CEEB; }
  </style>
</head>
<body>

  <div id="login-screen" class="screen active">
    <h1>Quem Eu Sou?</h1>
    <input type="text" id="username" placeholder="Digite seu usuário" autocapitalize="none">
    <button id="btn-login">Entrar</button>
  </div>

  <div id="admin-screen" class="screen">
    <h1>Painel Administrativo</h1>
    <input type="text" id="new-user" placeholder="Novo usuário para cadastrar">
    <button id="btn-add-user">Cadastrar Usuário</button>
    <button id="btn-reset-rank" style="background-color: #ff4c4c; color: white;">Zerar Ranking</button>
    <button id="btn-admin-voltar">Ir para o Jogo</button>
  </div>

  <div id="home-screen" class="screen">
    <h1>Escolha a Categoria</h1>
    <select id="time-select">
      <option value="60">1 Minuto</option>
      <option value="120">2 Minutos</option>
      <option value="180">3 Minutos</option>
      <option value="240">4 Minutos</option>
      <option value="300">5 Minutos</option>
    </select>
    <div class="grid" id="category-grid">
      </div>
    <button id="btn-ver-ranking" style="margin-top: 20px;">Ver Ranking</button>
  </div>

  <div id="game-screen" class="screen">
    <div id="timer-display">00:00</div>
    <div id="word-display">PREPARANDO...</div>
    <div class="instrucao">Gire a tela para CIMA (Acertou) | Gire para BAIXO (Pulou)</div>
    <button id="btn-start-sensor" style="display:none; position:absolute; bottom:80px; width: 60%;">Iniciar Sensor de Movimento</button>
  </div>

  <div id="ranking-screen" class="screen">
    <h1>Ranking Oficial</h1>
    <div class="table-container">
      <table id="ranking-table">
        <tr><th>Usuário</th><th>Pontuação</th></tr>
        </table>
    </div>
    <button id="btn-voltar-home">Voltar ao Início</button>
  </div>

  <script type="module">
    // Importações do Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // 1. Sua Configuração do Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBlig3r_GYe6QH4ZpVaYw13TtJSnETdx88",
      authDomain: "trick-house8060.firebaseapp.com",
      databaseURL: "https://trick-house8060-default-rtdb.firebaseio.com",
      projectId: "trick-house8060",
      storageBucket: "trick-house8060.firebasestorage.app",
      messagingSenderId: "735425634096",
      appId: "1:735425634096:web:393854297a9912796472f5",
      measurementId: "G-GNV0LYMYBD"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 2. SUA NOVA CHAVE DO GEMINI (Formato AQ)
    const GEMINI_API_KEY = "AQ.Ab8RN6ISoPrecoTTT1UStyyGLed1wzxnajmc_DECQMf9yZDJoA"; 

    // Variáveis Globais
    let currentUser = "";
    let currentScore = 0;
    let gameTime = 60;
    let timerInterval;
    let words = [];
    let isPlaying = false;
    let sensorLocked = false;

    // Categorias Padrão
    const categorias = [
      { id: "profissao", nome: "Profissão", img: "https://cdn-icons-png.flaticon.com/512/3281/3281223.png" },
      { id: "comida", nome: "Comida", img: "https://cdn-icons-png.flaticon.com/512/3480/3480418.png" },
      { id: "animal", nome: "Animal", img: "https://cdn-icons-png.flaticon.com/512/3069/3069224.png" },
      { id: "desenho", nome: "Desenho", img: "https://cdn-icons-png.flaticon.com/512/1037/1037365.png" },
      { id: "esporte", nome: "Esporte", img: "https://cdn-icons-png.flaticon.com/512/857/857418.png" },
      { id: "pais", nome: "País", img: "https://cdn-icons-png.flaticon.com/512/2947/2947656.png" },
      { id: "objetos", nome: "Objetos", img: "https://cdn-icons-png.flaticon.com/512/2888/2888636.png" },
      { id: "musicas", nome: "Músicas", img: "https://cdn-icons-png.flaticon.com/512/3004/3004593.png" },
      { id: "herois", nome: "Heróis", img: "https://cdn-icons-png.flaticon.com/512/1154/1154448.png" },
      { id: "marcas", nome: "Marcas", img: "https://cdn-icons-png.flaticon.com/512/1162/1162464.png" },
      { id: "diversos", nome: "Diversos", img: "https://cdn-icons-png.flaticon.com/512/616/616490.png" }
    ];

    // Navegação de Telas
    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
    }

    // Login e Verificação
    document.getElementById('btn-login').addEventListener('click', async () => {
      const user = document.getElementById('username').value.trim();
      if (!user) return alert("Digite um usuário!");

      if (user === "au.costa") {
        currentUser = user;
        showScreen('admin-screen');
      } else {
        const userRef = ref(db, `users/${user}`);
        const snapshot = await get(userRef);
        if (snapshot.exists()) {
          currentUser = user;
          renderCategories();
          showScreen('home-screen');
        } else {
          alert("Usuário não cadastrado! Peça para au.costa criar seu acesso.");
        }
      }
    });

    // Funções do Admin
    document.getElementById('btn-admin-voltar').addEventListener('click', () => {
      renderCategories();
      showScreen('home-screen');
    });

    document.getElementById('btn-add-user').addEventListener('click', () => {
      const newUser = document.getElementById('new-user').value.trim();
      if (newUser) {
        set(ref(db, `users/${newUser}`), { score: 0 });
        alert(`Usuário ${newUser} cadastrado com sucesso!`);
        document.getElementById('new-user').value = '';
      }
    });

    document.getElementById('btn-reset-rank').addEventListener('click', async () => {
      if(confirm("Tem certeza que deseja zerar o ranking de todos?")) {
        const usersRef = ref(db, 'users');
        const snapshot = await get(usersRef);
        if (snapshot.exists()) {
          const updates = {};
          snapshot.forEach(child => {
            updates[`users/${child.key}/score`] = 0;
          });
          update(ref(db), updates);
          alert("Ranking zerado!");
        }
      }
    });

    // Renderizar Categorias na Home
    function renderCategories() {
      const grid = document.getElementById('category-grid');
      grid.innerHTML = '';
      categorias.forEach(cat => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<img src="${cat.img}" alt="${cat.nome}"><span>${cat.nome}</span>`;
        div.onclick = () => startGame(cat.nome);
        grid.appendChild(div);
      });
    }

    // Botões de Navegação
    document.getElementById('btn-ver-ranking').addEventListener('click', () => {
      loadRanking();
      showScreen('ranking-screen');
    });

    document.getElementById('btn-voltar-home').addEventListener('click', () => {
      showScreen('home-screen');
    });

    // CONEXÃO EXATA COMO O SEU CURL (Usando Headers para a chave AQ)
    async function fetchGeminiWords(categoria) {
      const prompt = `Gere uma lista de 30 palavras ou nomes muito famosos da categoria "${categoria}" para um jogo de adivinhação tipo charadas. Retorne APENAS as palavras separadas por vírgula, sem quebras de linha ou numeração.`;
      
      try {
        const response = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent", {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'X-goog-api-key': GEMINI_API_KEY // Chave oculta no Header
          },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        
        if (!response.ok) {
            const errorDetails = await response.text();
            console.error("Erro na API do Gemini:", response.status, errorDetails);
            return ["ERRO DE API", "VERIFIQUE CONSOLE", "TENTE NOVAMENTE"];
        }

        const data = await response.json();
        
        if (data.candidates && data.candidates.length > 0) {
            const texto = data.candidates[0].content.parts[0].text;
            return texto.split(',').map(w => w.trim());
        } else {
            return ["ERRO NA LEITURA", "TENTE NOVAMENTE"];
        }

      } catch (error) {
        console.error("Erro fatal na comunicação:", error);
        return ["ERRO DE CONEXÃO", "TENTE NOVAMENTE"];
      }
    }

    // Iniciar Jogo
    async function startGame(categoria) {
      gameTime = parseInt(document.getElementById('time-select').value);
      currentScore = 0;
      showScreen('game-screen');
      document.getElementById('word-display').innerText = "GERANDO...";
      
      // Busca palavras na IA
      words = await fetchGeminiWords(categoria);
      words = words.sort(() => Math.random() - 0.5); 
      
      isPlaying = true;
      nextWord();
      
      // Iniciar Timer
      let timeLeft = gameTime;
      document.getElementById('timer-display').innerText = formatTime(timeLeft);
      timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer-display').innerText = formatTime(timeLeft);
        if (timeLeft <= 0) endGame();
      }, 1000);

      // Permissão para Giroscópio
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        document.getElementById('btn-start-sensor').style.display = 'block';
        document.getElementById('btn-start-sensor').onclick = () => {
          DeviceOrientationEvent.requestPermission().then(response => {
            if (response == 'granted') window.addEventListener('deviceorientation', handleOrientation);
          }).catch(console.error);
          document.getElementById('btn-start-sensor').style.display = 'none';
        }
      } else {
        window.addEventListener('deviceorientation', handleOrientation);
      }
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function nextWord() {
      if (words.length === 0) {
        document.getElementById('word-display').innerText = "ACABOU!";
        setTimeout(endGame, 2000);
        return;
      }
      document.getElementById('word-display').innerText = words.pop();
    }

    // Lógica do Sensor de Movimento
    function handleOrientation(event) {
      if (!isPlaying || sensorLocked) return;

      const tilt = event.beta; 

      if (tilt < -30) {
        handleAction(true); // Acertou
      } else if (tilt > 60) {
        handleAction(false); // Pulou
      }
    }

    function handleAction(acertou) {
      sensorLocked = true;
      const gameScreen = document.getElementById('game-screen');
      
      if (acertou) {
        currentScore++;
        gameScreen.style.backgroundColor = "#4CAF50"; 
      } else {
        gameScreen.style.backgroundColor = "#ff4c4c"; 
      }

      setTimeout(() => {
        gameScreen.style.backgroundColor = "#87CEEB"; 
        nextWord();
        sensorLocked = false;
      }, 1000); 
    }

    // Fim de Jogo
    async function endGame() {
      isPlaying = false;
      clearInterval(timerInterval);
      window.removeEventListener('deviceorientation', handleOrientation);

      if (currentUser !== "au.costa") {
        const userRef = ref(db, `users/${currentUser}`);
        const snapshot = await get(userRef);
        let totalScore = currentScore;
        if (snapshot.exists()) {
          totalScore += snapshot.val().score || 0;
        }
        await update(ref(db, `users/${currentUser}`), { score: totalScore });
      }

      loadRanking();
      showScreen('ranking-screen');
    }

    // Ranking
    function loadRanking() {
      const rankingRef = ref(db, 'users');
      onValue(rankingRef, (snapshot) => {
        const table = document.getElementById('ranking-table');
        table.innerHTML = '<tr><th>Usuário</th><th>Pontuação Total</th></tr>';
        
        let usersArray = [];
        snapshot.forEach(child => {
          usersArray.push({ nome: child.key, score: child.val().score || 0 });
        });

        usersArray.sort((a, b) => b.score - a.score);

        usersArray.forEach(u => {
          table.innerHTML += `<tr><td>${u.nome}</td><td>${u.score}</td></tr>`;
        });
      });
    }

    // Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(err => console.log("SW não registrado (Normal em testes locais)"));
    }
  </script>
</body>
</html>
