<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quem Eu Sou</title>
  <meta name="theme-color" content="#87CEEB">
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body { background-color: #87CEEB; color: #333; height: 100vh; overflow: hidden; }
    
    .screen { display: none; width: 100vw; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .active { display: flex; }
    
    /* Telas de Menu e Login */
    h1 { color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 20px; text-align: center; }
    input, select, button { padding: 15px; margin: 10px; border-radius: 10px; border: none; font-size: 18px; width: 80%; max-width: 400px; }
    button { background-color: #fff; color: #87CEEB; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    
    /* Botões de Sair/Logout e Usuários */
    .btn-logout { background-color: #ff4c4c !important; color: white !important; }
    .btn-user { background-color: #4CAF50 !important; color: white !important; font-size: 20px; }
    .btn-rank-home { background-color: #ffb74d !important; color: white !important; }
    .btn-leave-group { background-color: transparent !important; border: 1px solid white !important; color: white !important; font-size: 14px !important; padding: 10px !important; }

    /* Controles da Home */
    .header-controls { display: flex; justify-content: center; align-items: center; width: 95%; max-width: 850px; gap: 10px; margin-bottom: 20px; }
    .header-controls select, .header-controls button { margin: 0; flex: 1; padding: 15px 5px; font-size: 15px; border-radius: 10px; }

    /* Grid de Categorias */
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 90%; max-width: 800px; }
    .card { background: white; border-radius: 15px; padding: 10px; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; aspect-ratio: 1; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .card img { width: 60%; height: 60%; object-fit: contain; margin-bottom: 10px; }
    .card span { font-weight: bold; font-size: 14px; }

    /* Tela do Jogo */
    #game-screen { background-color: #87CEEB; transition: background-color 0.3s; position: relative; }
    #word-display { font-size: 8vw; color: white; font-weight: bold; text-align: center; text-transform: uppercase; padding: 0 20px; z-index: 10; pointer-events: none; }
    #timer-display { position: absolute; top: 20px; right: 20px; font-size: 24px; color: white; font-weight: bold; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; z-index: 10; pointer-events: none; }

    /* Ranking e Admin */
    .table-container { background: white; width: 90%; max-width: 600px; border-radius: 15px; padding: 20px; max-height: 50vh; overflow-y: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; }
    table { width: 100%; text-align: left; border-collapse: collapse; }
    th, td { padding: 12px 10px; border-bottom: 1px solid #eee; }
    th { color: #87CEEB; }
    
    /* Sessões Admin */
    .admin-section { background: rgba(255,255,255,0.2); padding: 15px; border-radius: 15px; margin-bottom: 15px; width: 90%; max-width: 450px; display: flex; flex-direction: column; align-items: center; }
    .admin-section h3 { color: white; margin-bottom: 10px; }
  </style>
</head>
<body>

  <div id="login-screen" class="screen active" style="justify-content: flex-start; padding-top: 40px;">
    <h1>Quem vai jogar?</h1>
    
    <div id="user-list" style="display: flex; flex-direction: column; width: 100%; align-items: center; max-height: 40vh; overflow-y: auto;">
      <p style="color: white; font-size: 14px;">Carregando...</p>
    </div>
    
    <button id="btn-leave-group" class="btn-leave-group" style="display: none; margin-bottom: 10px;">Desconectar Aparelho deste Grupo</button>

    <div style="width: 100%; max-width: 400px; border-top: 1px solid rgba(255,255,255,0.5); padding-top: 15px; display: flex; flex-direction: column; align-items: center;">
      <p style="color: white; font-size: 14px; margin-bottom: 5px; text-align: center;">Acesso Administrativo (Vincular Aparelho):</p>
      <input type="text" id="admin-username" placeholder="Nome do Admin" autocapitalize="none" style="padding: 10px; margin-bottom: 5px;">
      <input type="password" id="admin-password" placeholder="Senha" style="padding: 10px; margin-bottom: 5px;">
      <button id="btn-login-admin" style="background-color: #333; color: white; padding: 10px; width: 50%;">Acessar Painel</button>
    </div>
  </div>

  <div id="admin-screen" class="screen" style="overflow-y: auto; justify-content: flex-start; padding-top: 40px;">
    <h1>Painel do Administrador</h1>
    
    <div class="admin-section" id="sec-import" style="display: none;">
      <h3>Importar Palavras (.TXT)</h3>
      <select id="admin-category-select" style="width: 90%;"></select>
      <input type="file" id="word-file" accept=".txt" style="background: white; padding: 10px; width: 90%;">
      <button id="btn-import-words">Salvar no Banco</button>
    </div>

    <div class="admin-section" id="sec-promote" style="display: none;">
      <h3>Criar Novo Admin (Nova Família)</h3>
      <input type="text" id="promote-user" placeholder="Nome do Admin (ex: familia_joao)" style="width: 90%;">
      <input type="text" id="promote-pass" placeholder="Senha provisória" style="width: 90%;">
      <button id="btn-promote-user" style="background-color: #ffb74d;">Cadastrar Admin</button>
    </div>

    <div class="admin-section" id="sec-manage">
      <h3>Gerenciar MEU Grupo</h3>
      <input type="text" id="new-user" placeholder="Nome do Jogador" style="width: 90%;">
      <button id="btn-add-user">Cadastrar na minha família</button>
      <button id="btn-reset-rank" class="btn-logout">Zerar Ranking da minha família</button>
    </div>

    <button id="btn-admin-voltar" style="margin-top: 20px;">Ir para o Jogo</button>
    <button id="btn-logout-admin" class="btn-logout" style="margin-top: 5px;">Sair do Admin</button>
  </div>

  <div id="home-screen" class="screen">
    <h1>Escolha a Categoria</h1>
    
    <div class="header-controls">
      <select id="time-select">
        <option value="60">1 Minuto</option>
        <option value="120">2 Minutos</option>
        <option value="180">3 Minutos</option>
        <option value="240">4 Minutos</option>
        <option value="300">5 Minutos</option>
      </select>
      <button id="btn-ver-ranking" class="btn-rank-home">Ver Ranking</button>
      <button id="btn-logout-home" class="btn-logout">Trocar Usuário</button>
    </div>

    <div class="grid" id="category-grid"></div>
  </div>

  <div id="game-screen" class="screen">
    <div id="timer-display">00:00</div>
    <div id="word-display">PREPARANDO...</div>
    <button id="btn-start-sensor" style="display:none; position:absolute; top:40%; z-index:20; width: 60%;">Permitir Sensor</button>
  </div>

  <div id="ranking-screen" class="screen">
    <h1>Ranking Oficial</h1>
    <div class="table-container">
      <table id="ranking-table">
        <tr><th>Usuário</th><th>Pontuação Total</th></tr>
      </table>
    </div>
    <button id="btn-voltar-home" style="margin-bottom: 0;">Voltar ao Início</button>
    <button id="btn-logout-rank" class="btn-logout" style="margin-top: 10px;">Trocar de Usuário</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlig3r_GYe6QH4ZpVaYw13TtJSnETdx88",
      authDomain: "trick-house8060.firebaseapp.com",
      databaseURL: "https://trick-house8060-default-rtdb.firebaseio.com",
      projectId: "trick-house8060",
      storageBucket: "trick-house8060.firebasestorage.app",
      messagingSenderId: "735425634096",
      appId: "1:735425634096:web:393854297a9912796472f5",
      measurementId: "G-GNV0LYMYBD"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentUser = "";
    let currentGroup = localStorage.getItem("gameGroup") || ""; 
    let currentScore = 0;
    let gameTime = 60;   
    let timeLeft = 60;   
    let timerInterval;
    let words = [];
    let isPlaying = false;
    let sensorLocked = false;

    const categorias = [
      { id: "profissao", nome: "Profissão", img: "https://cdn-icons-png.flaticon.com/512/3281/3281223.png" },
      { id: "comida", nome: "Comida", img: "https://cdn-icons-png.flaticon.com/512/3480/3480418.png" },
      { id: "animal", nome: "Animal", img: "https://cdn-icons-png.flaticon.com/512/3069/3069224.png" },
      { id: "desenho", nome: "Desenho", img: "https://cdn-icons-png.flaticon.com/512/1037/1037365.png" },
      { id: "esporte", nome: "Esporte", img: "https://cdn-icons-png.flaticon.com/512/857/857418.png" },
      { id: "pais", nome: "País", img: "https://cdn-icons-png.flaticon.com/512/2947/2947656.png" },
      { id: "objetos", nome: "Objetos", img: "https://cdn-icons-png.flaticon.com/512/2888/2888636.png" },
      { id: "musicas", nome: "Músicas", img: "https://cdn-icons-png.flaticon.com/512/3004/3004593.png" },
      { id: "herois", nome: "Heróis", img: "https://cdn-icons-png.flaticon.com/512/1154/1154448.png" },
      { id: "marcas", nome: "Marcas", img: "https://cdn-icons-png.flaticon.com/512/1162/1162464.png" },
      { id: "diversos", nome: "Diversos", img: "https://cdn-icons-png.flaticon.com/512/616/616490.png" }
    ];

    const adminCatSelect = document.getElementById('admin-category-select');
    categorias.forEach(cat => {
      const opt = document.createElement('option');
      opt.value = cat.id;
      opt.innerText = cat.nome;
      adminCatSelect.appendChild(opt);
    });

    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
    }

    // ==========================================
    // CARREGAMENTO DE JOGADORES DO GRUPO (SEM SENHA)
    // ==========================================
    async function loadUsersForLogin() {
      const userList = document.getElementById('user-list');
      const btnLeave = document.getElementById('btn-leave-group');
      userList.innerHTML = '';

      if (!currentGroup) {
        userList.innerHTML = '<p style="color: white; font-size: 14px; text-align: center; margin-bottom: 10px;">Aparelho não vinculado a nenhuma família.<br>Administrador: Faça login abaixo para iniciar.</p>';
        btnLeave.style.display = 'none';
        return;
      }

      btnLeave.style.display = 'block';
      
      // Busca jogadores ESPECÍFICOS deste grupo
      const playersRef = ref(db, `jogadores_do_jogo/${currentGroup}`);
      const snapshot = await get(playersRef);
      
      if (snapshot.exists()) {
        snapshot.forEach(child => {
          const playerName = child.key;
          
          const btn = document.createElement('button');
          btn.innerText = playerName;
          btn.className = "btn-user"; 
          
          // Entra direto sem senha!
          btn.onclick = () => {
            currentUser = playerName;
            renderCategories();
            showScreen('home-screen');
          };
          userList.appendChild(btn);
        });
      } else {
        userList.innerHTML = '<p style="color: white; font-size: 14px;">Nenhum jogador cadastrado nesta família.</p>';
      }
    }

    loadUsersForLogin();

    function fazerLogout() {
      currentUser = "";
      document.getElementById('admin-username').value = ""; 
      document.getElementById('admin-password').value = ""; 
      loadUsersForLogin(); 
      showScreen('login-screen');
    }

    document.getElementById('btn-leave-group').addEventListener('click', () => {
      localStorage.removeItem('gameGroup');
      currentGroup = "";
      loadUsersForLogin();
    });

    document.getElementById('btn-logout-home').addEventListener('click', fazerLogout);
    document.getElementById('btn-logout-rank').addEventListener('click', fazerLogout);
    document.getElementById('btn-logout-admin').addEventListener('click', fazerLogout);

    // ==========================================
    // LOGIN DO ADMINISTRADOR (COM SENHA)
    // ==========================================
    document.getElementById('btn-login-admin').addEventListener('click', async () => {
      const adminName = document.getElementById('admin-username').value.trim();
      const adminPass = document.getElementById('admin-password').value.trim();

      if (!adminName || !adminPass) return alert("Preencha o Nome e a Senha de Administrador!");

      // 1. CHECAGEM DO SUPER ADMIN (Você)
      if (adminName === "au.costa" || adminName === "au_costa") {
        if (adminPass === "80605276") { // <--- SUA SENHA MESTRE AQUI
          currentGroup = "au_costa"; 
          localStorage.setItem('gameGroup', currentGroup);
          
          document.getElementById('sec-import').style.display = 'flex';
          document.getElementById('sec-promote').style.display = 'flex';
          showScreen('admin-screen');
          
          document.getElementById('admin-username').value = "";
          document.getElementById('admin-password').value = "";
          return;
        } else {
          return alert("Senha mestre incorreta!");
        }
      }

      // 2. CHECAGEM DE ADMINS DE GRUPO (Seus amigos/clientes)
      const adminRef = ref(db, `admins_do_jogo/${adminName}`);
      const snapshot = await get(adminRef);
      
      if (snapshot.exists() && snapshot.val().password === adminPass) {
        currentGroup = adminName;
        localStorage.setItem('gameGroup', currentGroup);
        
        // Esconde opções de Super Admin
        document.getElementById('sec-import').style.display = 'none';
        document.getElementById('sec-promote').style.display = 'none';
        
        showScreen('admin-screen');
        document.getElementById('admin-username').value = "";
        document.getElementById('admin-password').value = "";
      } else {
        alert("Administrador não encontrado ou Senha incorreta!");
      }
    });

    // ==========================================
    // FUNÇÕES ADMIN (Isoladas por Grupo)
    // ==========================================
    document.getElementById('btn-admin-voltar').addEventListener('click', () => {
      renderCategories();
      showScreen('home-screen');
    });

    // SUPER ADMIN: Criar Novo Admin (Nova Família)
    document.getElementById('btn-promote-user').addEventListener('click', async () => {
      const targetAdmin = document.getElementById('promote-user').value.trim();
      const targetPass = document.getElementById('promote-pass').value.trim();

      if (!targetAdmin || !targetPass) return alert("Preencha o nome e a senha do novo admin!");
      if (targetAdmin === "au.costa" || targetAdmin === "au_costa") return alert("Nome reservado!");
      
      const adminRef = ref(db, `admins_do_jogo/${targetAdmin}`);
      const snap = await get(adminRef);
      
      if (snap.exists()) {
        alert("Já existe um administrador (família) com este nome!");
      } else {
        await set(adminRef, { password: targetPass });
        alert(`Sucesso! O Grupo/Admin "${targetAdmin}" foi criado com a senha "${targetPass}". Ele já pode logar.`);
        document.getElementById('promote-user').value = '';
        document.getElementById('promote-pass').value = '';
      }
    });

    // QUALQUER ADMIN: Adicionar jogador à sua família
    document.getElementById('btn-add-user').addEventListener('click', async () => {
      const newPlayer = document.getElementById('new-user').value.trim();
      if (!newPlayer) return;

      const playerRef = ref(db, `jogadores_do_jogo/${currentGroup}/${newPlayer}`);
      const snap = await get(playerRef);

      if (snap.exists()) {
        alert("Atenção: Esse nome JÁ EXISTE no seu grupo! Escolha outro nome (ex: João_Filho).");
      } else {
        await set(playerRef, { score: 0 });
        alert(`Jogador "${newPlayer}" adicionado com sucesso ao seu grupo!`);
        document.getElementById('new-user').value = '';
        loadUsersForLogin(); 
      }
    });

    // QUALQUER ADMIN: Zerar ranking do seu grupo
    document.getElementById('btn-reset-rank').addEventListener('click', async () => {
      if(confirm("Zerar a pontuação de TODOS do seu grupo?")) {
        const groupRef = ref(db, `jogadores_do_jogo/${currentGroup}`);
        const snapshot = await get(groupRef);
        
        if (snapshot.exists()) {
          const updates = {};
          snapshot.forEach(child => {
            updates[`jogadores_do_jogo/${currentGroup}/${child.key}/score`] = 0;
          });
          await update(ref(db), updates);
          alert("Ranking do grupo zerado!");
        }
      }
    });

    // SUPER ADMIN: Importar Palavras
    document.getElementById('btn-import-words').addEventListener('click', () => {
      const fileInput = document.getElementById('word-file');
      const catId = document.getElementById('admin-category-select').value;
      const catNome = document.getElementById('admin-category-select').options[document.getElementById('admin-category-select').selectedIndex].text;

      if (!fileInput.files.length) return alert("Selecione um arquivo .txt");
      
      const reader = new FileReader();
      reader.onload = async (e) => {
        const text = e.target.result;
        const rawWords = text.split(/[\n,]+/);
        const cleanWords = rawWords.map(w => w.trim()).filter(w => w.length > 0);
        
        if (cleanWords.length > 0) {
           await set(ref(db, `words_do_jogo/${catId}`), cleanWords);
           alert(`Sucesso! ${cleanWords.length} palavras importadas em "${catNome}".`);
           fileInput.value = ""; 
        } else {
           alert("Arquivo vazio ou inválido.");
        }
      };
      reader.readAsText(fileInput.files[0]);
    });

    // ==========================================
    // LÓGICA DO JOGO
    // ==========================================
    function renderCategories() {
      const grid = document.getElementById('category-grid');
      grid.innerHTML = '';
      categorias.forEach(cat => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<img src="${cat.img}" alt="${cat.nome}"><span>${cat.nome}</span>`;
        div.onclick = () => startGame(cat.id); 
        grid.appendChild(div);
      });
    }

    async function startGame(catId) {
      gameTime = parseInt(document.getElementById('time-select').value);
      currentScore = 0;
      showScreen('game-screen');
      document.getElementById('word-display').innerText = "CARREGANDO...";
      
      const wordsRef = ref(db, `words_do_jogo/${catId}`);
      const snapshot = await get(wordsRef);
      
      if (snapshot.exists() && snapshot.val().length > 0) {
        words = snapshot.val();
        words = words.sort(() => Math.random() - 0.5); 
      } else {
        alert("Nenhuma palavra nesta categoria!");
        showScreen('home-screen');
        return;
      }
      
      isPlaying = true;
      nextWord();
      
      timeLeft = gameTime;
      document.getElementById('timer-display').innerText = formatTime(timeLeft);
      timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer-display').innerText = formatTime(timeLeft);
        if (timeLeft <= 0) endGame();
      }, 1000);

      if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
        document.getElementById('btn-start-sensor').style.display = 'block';
        document.getElementById('btn-start-sensor').onclick = () => {
          DeviceMotionEvent.requestPermission().then(response => {
            if (response == 'granted') window.addEventListener('devicemotion', handleMotion);
          }).catch(console.error);
          document.getElementById('btn-start-sensor').style.display = 'none';
        }
      } else {
        window.addEventListener('devicemotion', handleMotion);
      }
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function nextWord() {
      if (words.length === 0) {
        document.getElementById('word-display').innerText = "FIM!";
        setTimeout(endGame, 2000);
        return;
      }
      document.getElementById('word-display').innerText = words.pop();
    }

    function handleMotion(event) {
      if (!isPlaying || sensorLocked) return;
      const z = event.accelerationIncludingGravity?.z;
      if (z === null || z === undefined) return;
      if (z > 5) handleAction(true);  
      else if (z < -5) handleAction(false); 
    }

    document.getElementById('game-screen').addEventListener('click', (e) => {
      if (!isPlaying || sensorLocked) return;
      if (e.clientX > window.innerWidth / 2) handleAction(true); 
      else handleAction(false); 
    });

    function handleAction(acertou) {
      sensorLocked = true;
      const gameScreen = document.getElementById('game-screen');
      
      if (acertou) {
        currentScore++;
        gameScreen.style.backgroundColor = "#4CAF50"; 
        timeLeft = gameTime; 
        document.getElementById('timer-display').innerText = formatTime(timeLeft);
      } else {
        gameScreen.style.backgroundColor = "#ff4c4c"; 
      }

      setTimeout(() => {
        gameScreen.style.backgroundColor = "#87CEEB"; 
        nextWord();
        sensorLocked = false;
      }, 1200); 
    }

    async function endGame() {
      isPlaying = false;
      clearInterval(timerInterval);
      window.removeEventListener('devicemotion', handleMotion);

      // Salva a pontuação exatamente na gaveta da Família/Grupo
      const playerRef = ref(db, `jogadores_do_jogo/${currentGroup}/${currentUser}`);
      const snapshot = await get(playerRef);
      
      let totalScore = currentScore;
      if (snapshot.exists() && snapshot.val().score) {
        totalScore += snapshot.val().score;
      }
      await update(playerRef, { score: totalScore });

      loadRanking();
      showScreen('ranking-screen');
    }

    // ==========================================
    // RANKING (Apenas a Família Atual)
    // ==========================================
    document.getElementById('btn-ver-ranking').addEventListener('click', () => {
      loadRanking();
      showScreen('ranking-screen');
    });

    document.getElementById('btn-voltar-home').addEventListener('click', () => {
      showScreen('home-screen');
    });

    function loadRanking() {
      // Puxa o ranking apenas de jogadores_do_jogo/NOME_DA_FAMILIA
      const groupRef = ref(db, `jogadores_do_jogo/${currentGroup}`);
      onValue(groupRef, (snapshot) => {
        const table = document.getElementById('ranking-table');
        table.innerHTML = '<tr><th>Jogador</th><th>Pontuação</th></tr>';
        
        let usersArray = [];
        if (snapshot.exists()) {
            snapshot.forEach(child => {
              usersArray.push({ nome: child.key, score: child.val().score || 0 });
            });
        }

        usersArray.sort((a, b) => b.score - a.score);

        usersArray.forEach(u => {
          table.innerHTML += `<tr><td>${u.nome}</td><td>${u.score}</td></tr>`;
        });
      });
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(err => console.log("SW não registrado"));
    }
  </script>
</body>
</html>
